name: Update skills index

on:
  push:
    branches:
      - main
    paths:
      - '**/SKILL.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    name: Regenerate index.md
    runs-on: ubuntu-latest
    steps:
      - name: Check out skills repository
        uses: actions/checkout@v4

      - name: Check out skill-compiler
        uses: actions/checkout@v4
        with:
          repository: leviathofnoesia/skill-compiler
          ref: master
          path: .skill-compiler

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .skill-compiler/package.json

      - name: Install compiler dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
        working-directory: .skill-compiler

      - name: Build skill-compiler
        run: npm run build
        working-directory: .skill-compiler

      - name: Regenerate index.md
        run: node .skill-compiler/dist/cli.js marketplace --dir . --out index.md

      - name: Commit updated index.md
        run: |
          if git diff --quiet -- index.md; then
            echo 'index.md is already up to date.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.md
          git commit -m 'chore: update generated skills index'
          git push
