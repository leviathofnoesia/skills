<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Paxai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: oklch(0.15 0.02 265);
            color: oklch(0.85 0.01 265);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 28rem;
            width: 100%;
            text-align: center;
        }

        .icon-wrapper {
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .icon-bg {
            width: 128px;
            height: 128px;
            background: oklch(0.25 0.02 265);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon {
            width: 64px;
            height: 64px;
            opacity: 0.6;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        p {
            color: oklch(0.65 0.01 265);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }

        .status-text {
            color: oklch(0.65 0.01 265);
            font-size: 0.875rem;
        }

        .features {
            background: oklch(0.2 0.02 265 / 0.3);
            border: 1px solid oklch(0.3 0.02 265 / 0.3);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .features-title {
            text-align: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: oklch(0.5 0.01 265);
            margin-bottom: 1rem;
        }

        .features ul {
            list-style: none;
        }

        .features li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
            color: oklch(0.65 0.01 265);
        }

        .features li:last-child {
            margin-bottom: 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #a2faa3;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .btn {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: oklch(0.8 0.12 160 / 0.1);
            border: 1px solid oklch(0.8 0.12 160 / 0.2);
            color: oklch(0.8 0.12 160);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .btn:hover {
            background: oklch(0.8 0.12 160 / 0.2);
        }

        .link {
            color: oklch(0.65 0.01 265);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .link:hover {
            color: oklch(0.85 0.01 265);
        }

        @media (prefers-color-scheme: light) {
            body {
                background: oklch(0.98 0.01 265);
                color: oklch(0.2 0.02 265);
            }

            .icon-bg {
                background: oklch(0.95 0.01 265);
            }

            p, .status-text, .features li {
                color: oklch(0.45 0.02 265);
            }

            .features {
                background: oklch(0.96 0.01 265 / 0.5);
                border-color: oklch(0.9 0.01 265 / 0.5);
            }

            .features-title {
                color: oklch(0.55 0.02 265);
            }

            .link {
                color: oklch(0.45 0.02 265);
            }

            .link:hover {
                color: oklch(0.2 0.02 265);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <div class="icon-bg">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"/>
                </svg>
            </div>
        </div>

        <h1>You're Offline</h1>
        <p>Looks like you've lost your internet connection. Check your network settings and try again.</p>

        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">No connection</span>
        </div>

        <div class="features">
            <div class="features-title">Available Offline</div>
            <ul>
                <li>
                    <div class="dot"></div>
                    <span>Previously visited pages</span>
                </li>
                <li>
                    <div class="dot"></div>
                    <span>Cached audio sessions</span>
                </li>
                <li>
                    <div class="dot"></div>
                    <span>Voice guidance files</span>
                </li>
            </ul>
        </div>

        <button class="btn" onclick="window.location.reload()">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            <span>Retry</span>
        </button>

        <a href="/" class="link">Return to Home</a>
    </div>

    <script>
        // Update status indicator when online/offline
        window.addEventListener('online', () => {
            const dot = document.querySelector('.status-dot');
            const text = document.querySelector('.status-text');
            if (dot && text) {
                dot.style.background = '#a2faa3';
                text.textContent = 'Connection restored';
            }
        });

        window.addEventListener('offline', () => {
            const dot = document.querySelector('.status-dot');
            const text = document.querySelector('.status-text');
            if (dot && text) {
                dot.style.background = '#ef4444';
                text.textContent = 'No connection';
            }
        });
    </script>
</body>
</html>
